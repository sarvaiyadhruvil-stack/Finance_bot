[tool.pytest.ini_options]
testpaths = ["tests"]
addopts   = "-v --tb=short"
log_cli   = false

[tool.ruff]
target-version = "py311"
line-length    = 88
select = ["E", "F", "W", "I", "UP", "B", "C4", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version         = "3.11"
strict                 = true
ignore_missing_imports = true
